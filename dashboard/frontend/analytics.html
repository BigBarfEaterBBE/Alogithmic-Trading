<!DOCTYPE html>
<html>
    <head>
        <title>Trading Analytics</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
       <div class="sidebar-container">
            <div class="sidebar-hover-zone"></div>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="sidebar">
                <h3>Navigation</h3>
                <a href="index.html" class="sidebar-link">
                    Dashboard
                </a>
                <div class="sidebar-link active-page">
                    Analytics
                </div>
            </div>
        </div>
        <h1 class="title">Trading Analytics</h1>
        <div class="dashboard analytics-grid">
            <div class="card drawdown-card">
                <h2>Drawdown Curve</h2>
                <div class="chart-container">
                    <canvas id="drawdownChart"></canvas>
                </div>
            </div>
            <div class="card histogram-card">
                <h2>Trade Return Histogram</h2>
                <div class="chart-container">
                    <canvas id="histogramChart"></canvas>
                </div>
            </div>
            <div class="card allocation-card">
                <h2>Portfolio Allocation</h2>
                <div class="chart-container">
                    <canvas id="allocationChart"></canvas>
                </div>
            </div>
            <div class="card exposure-card">
                <h2>Exposure</h2>
                <div class="exposure-grid">
                    <div class="exposure-box">
                        <span>Long</span>
                        <h3 id="longExposure">0%</h3>
                    </div>
                    <div class="exposure-box">
                        <span>Short</span>
                        <h3 id="shortExposure">0%</h3>
                    </div>
                    <div class="exposure-box">
                        <span>Cash</span>
                        <h3 id="cashExposure">0%</h3>
                    </div>
                </div>
                <div class="chart-container">
                    <canvas id="exposureChart"></canvas>
                </div>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script src="analytics.js"></script>
    </body>
</html>
