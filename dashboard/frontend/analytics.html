<!DOCTYPE html>
<html>
    <head>
        <title>Trading Analytics</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
       <div class="sidebar-container">
            <div class="sidebar-hover-zone"></div>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="sidebar">
                <h3>Navigation</h3>
                <a href="index.html" class="sidebar-link">
                    Dashboard
                </a>
                <div class="sidebar-link active-page">
                    Analytics
                </div>
            </div>
        </div>
        <h1 class="title">Trading Analytics</h1>
        <div class="dashboard analytics-grid">
            <div class="card drawdown-card">
                <h2>Drawdown Curve</h2>
                <div class="chart-container">
                    <canvas id="drawdownChart"></canvas>
                </div>
            </div>
            <div class="card histogram-card">
                <h2>Trade Return Histogram</h2>
                <div class="chart-container">
                    <canvas id="histogramChart"></canvas>
                </div>
            </div>
            <div class="card allocation-card">
                <h2>Portfolio Allocation</h2>
                <div class="chart-container">
                    <canvas id="allocationChart"></canvas>
                </div>
            </div>
            <div class="card duration-card">
                <h2>Trade Duration Analysis</h2>
                <div class="duration-grid">
                    <div class="duration-box">
                        <span>Average</span>
                        <h3 id="avgDuration">0h</h3>
                    </div>
                    <div class="duration-box">
                        <span>Shortest</span>
                        <h3 id="minDuration">0h</h3>
                    </div>
                    <div class="duration-box">
                        <span>Longest</span>
                        <h3 id="maxDuration">0h</h3>
                    </div>
                </div>
                <div class="chart-container">
                    <canvas id="durationChart"></canvas>
                </div>
            </div>
            <div class="card strategy-comparison-card">
                <h2>Strategy Comparison</h2>
                <table class="positions-table">
                    <thead>
                        <tr>
                            <th>Strategy</th>
                            <th>Return</th>
                            <th>Win Rate</th>
                            <th>Trades</th>
                            <th>Avg Trade</th>
                            <th>Max DD</th>
                        </tr>
                    </thead>
                    <tbody id="strategyComparisonBody"></tbody>
                </table>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script src="analytics.js"></script>
    </body>
</html>
