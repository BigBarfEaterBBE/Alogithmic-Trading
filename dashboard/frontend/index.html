<!DOCTYPE html>
<html>
    <head>
        <title>Trading Dashboard</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <audio id="bgMusic" loop>
            <source src="assets/stock-market-sounds.mp3" type="audio/mpeg">
        </audio>
        <script>
            document.addEventListener('DOMContentLoaded', () => {
                const audio = document.getElementById("bgMusic");

                const start = async () => {
                    try {
                        await audio.play();
                        console.log("Audio playing");
                    } catch (e) {
                        console.log("Autoplay blocked:", e);
                    }

                    document.removeEventListener("click", start);
                    document.removeEventListener("touchstart", start);
                };
                document.addEventListener("click", start, { once: true });
                document.addEventListener("touchstart", start, { once: true });
            })
            
        </script>
        <h1 class="title">Trading Dashboard</h1>
        <div class="dashboard">
            <div class="card chart-card">
                
                <div class="chart-header">
                    <div>
                        <h2>Portfolio Equity</h2>
                    </div>
                    <div class="chart-buttons">
                        <button class="chart-btn active" data-range="5D">5D</button>
                        <button class="chart-btn" data-range="1M">1M</button>
                        <button class="chart-btn" data-range="MAX">MAX</button>
                    </div>
                </div>
                <canvas id="equityChart"></canvas>
            </div>
            <div class="bottom-section">
                <div class="card">
                    <h2>Open Positions</h2>
                    <ul id="positions"></ul>
                </div>
                <div class="card">
                    <h2>Trade History</h2>
                    <table id="tradesTable"></table>
                </div>
            </div>
            
        </div>
        
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script src="script.js"></script>
    </body>
</html>
