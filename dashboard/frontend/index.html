<!DOCTYPE html>
<html>
    <head>
        <title>Trading Dashboard</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <h1 class="title">Trading Dashboard</h1>
        <div class="dashboard">
            <div class="card chart-card">
                
                <div class="chart-header">
                    <div>
                        <h2>Portfolio Equity</h2>
                    </div>
                    <div class="chart-buttons">
                        <span class="chart-option active" data-range="1D">1D</span>
                        <span class="divider">/</span>
                        <span class="chart-option" data-range="5D">5D</span>
                        <span class="divider">/</span>
                        <span class="chart-option" data-range="1M">1M</span>
                        <span class="divider">/</span>
                        <span class="chart-option" data-range="MAX">MAX</span>

                        <span class="divider">/</span>

                        <span class="strategy-option active" data-strategy="TOTAL">TOTAL</span>
                        <span class="divider">/</span>
                        <span class="strategy-option" data-strategy="MR">MR</span>
                        <span class="divider">/</span>
                        <span class="strategy-option" data-strategy="PB">PB</span>

                    </div>
                </div>
                <canvas id="equityChart"></canvas>
            </div>
            <div class="bottom-section">
                <div class="card">
                    <h2>Open Positions</h2>
                    <ul id="positions"></ul>
                </div>
                <div class="card">
                    <h2>Trade History</h2>
                    <table id="tradesTable"></table>
                </div>
            </div>
            
        </div>
        
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script src="script.js"></script>
    </body>
</html>
