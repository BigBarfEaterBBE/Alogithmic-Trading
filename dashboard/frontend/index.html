<!DOCTYPE html>
<html>
    <head>
        <title>Trading Dashboard</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <h1 class="title">Trading Dashboard</h1>
        <div class="dashboard">
            <div class="ticker-wrapper card">
                <div class="ticker-track" id="tickerTrack"></div>
            </div>
            <div class="card chart-card">
                
                <div class="chart-header">
                    <div>
                        <h2>Portfolio Equity</h2>
                    </div>
                    <div class="chart-buttons">
                        <div class="avg-toggle-group">
                            <div class="toggle-wrapper active" id="toggleRolling">
                                <div class="toggle-switch"></div>
                                <span>Rolling Avg</span>
                            </div>
                            <div class="toggle-wrapper" id="toggleFlat">
                                <div class="toggle-switch"></div>
                                <span>Flat Avg</span>
                            </div>
                        </div>

                        <span class="chart-option" data-range="1D">1D</span>
                        <span class="divider">/</span>
                        <span class="chart-option active" data-range="5D">5D</span>
                        <span class="divider">/</span>
                        <span class="chart-option" data-range="1M">1M</span>
                        <span class="divider">/</span>
                        <span class="chart-option" data-range="MAX">MAX</span>

                        <span class="divider">/</span>

                        <span class="strategy-option active" data-strategy="TOTAL">TOTAL</span>
                        <span class="divider">/</span>
                        <span class="strategy-option" data-strategy="MR">MR</span>
                        <span class="divider">/</span>
                        <span class="strategy-option" data-strategy="PB">PB</span>

                    </div>
                </div>
                <canvas id="equityChart"></canvas>
            </div>
            <div class="bottom-section">
                <div class="card">
                    <div class="positions-top">
                        <h2>Open Positions</h2>
                        <div class="positions-filters">
                            <span class="positions-filter active" data-position-filter="TOTAL">TOTAL</span>
                            <span class="divider">/</span>
                            <span class="positions-filter" data-position-filter="MR">MR</span>
                            <span class="divider">/</span>
                            <span class="positions-filter" data-position-filter="PB">PB</span>
                        </div>
                    </div>
                    <table class="positions-table">
                        <thead>
                            <tr>
                                <th>Ticker</th>
                                <th>Shares</th>
                                <th>Value</th>
                                <th>1D Chg</th>
                                <th>Return</th>
                            </tr>
                        </thead>
                        <tbody id="positionsBody"></tbody>
                    </table>
                </div>
                <div class="card trades-card">
                    <div class="trades-header">
                        <h2>Recent Trades</h2>
                        <div class="trades-controls">
                            <div class="trade-filters">
                                <span class="trade-filter active" data-trade-strategy="TOTAL">TOTAL</span>
                                <span class="divider">/</span>
                                <span class="trade-filter" data-trade-strategy="PB">PB</span>
                                <span class="divider">/</span>
                                <span class="trade-filter" data-trade-strategy="MR">MR</span>
                            </div>
                            <div class="trade-filters">
                                <span class="trade-side-filter active" data-trade-side="ALL">ALL</span>
                                <span class="divider">/</span>
                                <span class="trade-side-filter" data-trade-side="BUY">BUY</span>
                                <span class="divider">/</span>
                                <span class="trade-side-filter" data-trade-side="SELL">SELL</span>
                            </div>
                            <div class="trades-pill" id="tradeCount">
                                0 Trades
                            </div>
                        </div>
                    </div>
                    <div class="trades-list" id="tradesTable"></div>
                </div>
            </div>
            
        </div>
        
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script src="script.js"></script>
    </body>
</html>
